<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book-Spring</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav>
            <h1>Book-Spring</h1>
            <ul>
                <li>
                    <button id="btnAbrirModal">Novo Livro</button>

                    <div id="modalLivro" class="modal">
                        <div class="modal-content">
                            <span class="fechar">&times;</span>
                            <h2>Cadastrar Livro</h2>
                            <form id="form-livro">
                                <input type="text" placeholder="Titulo" required>
                                
                            </form>
                        </div>
                    </div>
                </li>
            </ul>
            
        </nav>
    </header>
    <main>
        
        <section id="livros">
            <h2>Livros</h2>
            <table id="tabela-livros">
            </table>
            <script src="script.js"></script> 
        </section>

    </main>
    <footer>

    </footer>
</body>

</html>
